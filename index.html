<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Arctic Secchi Searcher</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#000; color:#fff; min-height:100vh; padding:20px 16px 40px; }
.container { max-width:520px; margin:0 auto; }
h1 { font-size:24px; font-weight:700; text-align:center; margin-bottom:4px; }
.subtitle { text-align:center; color:#8e8e93; font-size:14px; margin-bottom:24px; }
.card { background:#1c1c1e; border-radius:16px; padding:20px; margin-bottom:16px; }
label { display:block; font-size:13px; font-weight:600; color:#8e8e93; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; }
.input-row { display:flex; gap:8px; margin-bottom:16px; }
.sign-btn { width:52px; flex:none; border:none; border-radius:12px; background:#2c2c2e; color:#fff; font-size:22px; font-weight:700; cursor:pointer; }
.sign-btn.neg { background:#3a1c1c; color:#ff453a; }
input[type=text] { flex:1; width:100%; background:#2c2c2e; border:1px solid #3a3a3c; border-radius:12px; color:#fff; font-size:18px; padding:14px 16px; outline:none; }
input[type=text]:focus { border-color:#0a84ff; }
input::placeholder { color:#5a5a5e; }
.find-btn { width:100%; padding:16px; border:none; border-radius:14px; background:#0a84ff; color:#fff; font-size:17px; font-weight:700; cursor:pointer; margin-top:4px; }
.find-btn:active { opacity:0.8; }
.hint { font-size:12px; color:#5a5a5e; margin-top:10px; line-height:1.5; }
.error { color:#ff453a; font-size:14px; margin-top:10px; display:none; }
#results { display:none; }
.result-header { font-size:15px; font-weight:600; color:#8e8e93; margin:20px 0 12px; }
.station-card { background:#1c1c1e; border-radius:16px; padding:16px; margin-bottom:12px; }
.station-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
.station-name { font-size:18px; font-weight:700; }
.rank { display:inline-block; background:#2c2c2e; color:#fff; font-size:12px; font-weight:700; border-radius:8px; padding:2px 8px; margin-right:8px; }
.distance { font-size:16px; font-weight:700; color:#fff; }
.coords-cell { font-size:10px; color:#8e8e93; white-space:nowrap; line-height:1.4; }
.station-card { overflow-x:auto; }
.coords { font-size:12px; color:#8e8e93; margin-bottom:10px; }
table { width:100%; border-collapse:collapse; }
th { font-size:12px; color:#8e8e93; text-align:left; padding:6px 8px; border-bottom:1px solid #2c2c2e; font-weight:600; }
td { font-size:14px; white-space:nowrap; padding:8px; border-bottom:1px solid #2c2c2e; }
tr:last-child td { border-bottom:none; }
.secchi-val { font-weight:700; }
</style>
</head>
<body>
<div class="container">
<h1>Arctic Secchi Searcher</h1>
<p class="subtitle">Enter coordinates to find the 10 nearest stations</p>

<div class="card">
<label>Latitude</label>
<div class="input-row">
<button type="button" class="sign-btn" id="latSign">+</button>
<input type="text" id="lat" inputmode="decimal" placeholder="xx.xxxx">
</div>
<label>Longitude</label>
<div class="input-row">
<button type="button" class="sign-btn neg" id="lonSign">&minus;</button>
<input type="text" id="lon" inputmode="decimal" placeholder="xxx.xxxx">
</div>
<button class="find-btn" id="findBtn">Find stations</button>
<p class="error" id="error"></p>

</div>

<div id="results">
<p class="result-header" id="resultHeader"></p>
<div id="resultList"></div>
</div>
</div>

<script>
// [site, year, lat, lon, secchi_depth_m]
var DATA = [["St.1",2021,65.173472,-168.690832,4],["St.1",2022,65.173359,-168.690941,5],["St.1",2023,65.1735,-168.6907,6],["St.1",2024,65.173433,-168.690875,6],["St.1",2025,65.174003,-168.690598,7],["St.3",2021,66.629908,-168.68738,7],["St.3",2022,67.669961,-168.960177,5],["St.3",2023,67.67,-168.96,7],["St.3",2024,67.670012,-168.959933,10],["St.3",2025,67.67,-168.959983,18],["St.8",2022,68.242333,-167.122188,10],["St.9",2023,69.1667,-168.6667,10],["St.10",2022,70.500083,-168.666374,11],["St.10",2023,70.5,-168.6667,10],["St.10",2024,70.4997,-168.667,7],["St.10",2025,70.5,-168.666867,6],["St.11",2023,71.43,-168.6667,8],["St.12",2021,69.166935,-168.66661,16],["St.13",2022,72.360068,-168.66666,13],["St.13",2023,72.36,-168.6667,8],["St.14",2021,70.50004,-168.666725,8],["St.16",2022,73.882617,-168.201552,14],["St.16",2024,73.862183,-168.1454,19],["St.16",2025,73.889417,-168.199732,22],["St.18",2021,72.345205,-168.702685,8],["St.18",2023,74.8006,-167.8983,22],["St.18",2024,74.790717,-168.084467,17],["St.18",2025,74.800395,-167.899913,23],["St.20",2022,76.995858,-170.063121,25],["St.20",2024,76.012533,-170.400275,15],["St.20",2025,75.497683,-161.1431,29],["St.21",2025,76.559958,-159.90345,34],["St.23",2021,74.778848,-167.874355,30],["St.23",2025,77.46236,-164.119012,22],["St.24",2024,76.968867,179.879783,14],["St.25",2025,75.69138,-166.637745,18],["St.26",2024,79.5025,177.39235,18],["St.27",2024,78.9898,172.872883,15],["St.27",2025,75.993685,-170.52481,18],["St.28",2021,78.020585,-174.929967,31],["St.28",2023,80,172.4,12],["St.28",2025,76.991122,-170.262337,22],["St.29",2024,77.00585,173.682,12],["St.30",2024,75.965817,173.541417,12],["St.30",2025,77.017003,-179.540783,21],["St.31",2022,74.025085,169.977497,18],["St.32",2022,74.688838,174.656815,16],["St.32",2023,76,173.6,19],["St.32",2025,77.955,173.316917,22],["St.33",2021,75.999968,179.999938,18],["St.34",2022,75.795736,177.099643,16],["St.34",2025,76.016503,173.59878,20],["St.35",2024,73.9936,170.0574,19],["St.36",2021,76.970845,179.860407,19],["St.36",2023,74,170,19],["St.36",2024,74.701133,174.51605,15],["St.37",2022,75.18552,179.944135,15],["St.37",2023,74.6948,174.6043,15],["St.39",2022,75.145171,-176.020621,13],["St.39",2025,74.1791,170.6932,25],["St.42",2021,80.003402,172.320778,14],["St.43",2023,75.206,-179.99,19],["St.43",2025,76.109185,178.759777,18],["St.44",2021,78.984427,173.174373,19],["St.44",2024,75.237897,-172.012955,20],["St.45",2023,75.15,-176,10],["St.45",2025,75.245467,179.810083,25],["St.46",2024,74.51643,-162.151567,18],["St.47",2022,75.691228,-168.638182,19],["St.47",2023,75.2404,-171.9725,13],["St.48",2021,77.014922,173.660347,21],["St.48",2023,75.0206,-169.9364,17],["St.48",2024,75.498438,-161.146627,26],["St.49",2024,76.538917,-159.890643,29],["St.50",2024,77.453373,-164.087253,14],["St.51",2022,77.468731,-164.217569,32],["St.52",2021,75.01665,173.565743,19],["St.52",2022,76.542837,-159.941194,29],["St.52",2023,76.5775,-164.3325,20],["St.53",2022,76.332264,-156.240984,23],["St.54",2023,77.4722,-164.118,22],["St.55",2021,73.996935,169.997613,20],["St.57",2023,76.3039,-156.2212,24],["St.65",2021,75.103822,-179.658115,16],["St.69",2021,75.242107,-171.982943,13],["St.76",2021,76.577878,-164.33748,30],["St.80",2021,78.441153,-163.673505,16],["St.83",2021,76.367673,-156.330608,28],["St.85",2021,74.521475,-162.20935,21]];

var latNeg = false, lonNeg = true;
function bindSign(btnId, get, set) {
  var btn = document.getElementById(btnId);
  btn.addEventListener('click', function() {
    set(!get());
    btn.innerHTML = get() ? '&minus;' : '+';
    btn.classList.toggle('neg', get());
  });
}
bindSign('latSign', function(){return latNeg;}, function(v){latNeg=v;});
bindSign('lonSign', function(){return lonNeg;}, function(v){lonNeg=v;});

function parseCoord(str) {
  if (!str) return null;
  str = str.trim().replace(/,/g, '.');
  var neg = false;
  if (/^[-\u2212]/.test(str)) { neg = true; str = str.slice(1); }
  var v = Number(str);
  if (isNaN(v) || str === '') return null;
  v = Math.abs(v);
  return neg ? -v : v;
}

function haversine(lat1, lon1, lat2, lon2) {
  var R = 6371.0088, rad = Math.PI / 180;
  var dLat = (lat2 - lat1) * rad, dLon = (lon2 - lon1) * rad;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
          Math.cos(lat1*rad)*Math.cos(lat2*rad)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return 2 * R * Math.asin(Math.sqrt(a));
}

function fmtCoord(lat, lon) {
  return Math.abs(lat).toFixed(4) + '\u00b0' + (lat >= 0 ? 'N' : 'S') + ', ' +
         Math.abs(lon).toFixed(4) + '\u00b0' + (lon >= 0 ? 'E' : 'W');
}

document.getElementById('findBtn').addEventListener('click', function() {
  var err = document.getElementById('error');
  err.style.display = 'none';
  var lat = parseCoord(document.getElementById('lat').value);
  var lon = parseCoord(document.getElementById('lon').value);
  if (lat === null || lon === null) {
    err.textContent = 'Please enter valid coordinates.';
    err.style.display = 'block'; return;
  }
  if (lat >= 0 && latNeg) lat = -lat;
  if (lon >= 0 && lonNeg) lon = -lon;
  if (Math.abs(lat) > 90 || Math.abs(lon) > 180) {
    err.textContent = 'Latitude must be within \u00b190\u00b0 and longitude within \u00b1180\u00b0.';
    err.style.display = 'block'; return;
  }

  // rank every measurement (year-row) purely by its own coordinates
  var ranked = DATA.map(function(r) {
    return { site: r[0], year: r[1], lat: r[2], lon: r[3], secchi: r[4],
             dist: haversine(lat, lon, r[2], r[3]) };
  });
  ranked.sort(function(a,b){ return a.dist - b.dist; });
  var top = ranked.slice(0, 10);

  var list = document.getElementById('resultList');
  list.innerHTML = '';
  var trs = top.map(function(r, i) {
    return '<tr><td><span class="rank">' + (i+1) + '</span></td>' +
           '<td class="secchi-val">' + r.site + '</td>' +
           '<td>' + r.year + '</td>' +
           '<td class="secchi-val">' + r.secchi + ' m</td>' +
           '<td>' + r.dist.toFixed(2) + ' km</td>' +
           '<td class="coords-cell">' + Math.abs(r.lat).toFixed(4) + '°' + (r.lat >= 0 ? 'N' : 'S') + '<br>' + Math.abs(r.lon).toFixed(4) + '°' + (r.lon >= 0 ? 'E' : 'W') + '</td></tr>';
  }).join('');
  var card = document.createElement('div');
  card.className = 'station-card';
  card.innerHTML = '<table><tr><th></th><th>Station</th><th>Year</th>' +
    '<th>Secchi depth</th><th>Distance</th><th>Position</th></tr>' + trs + '</table>';
  list.appendChild(card);
  document.getElementById('resultHeader').textContent =
    '10 nearest measurements from ' + fmtCoord(lat, lon);
  document.getElementById('results').style.display = 'block';
});
</script>
</body>
</html>
